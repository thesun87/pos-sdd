# Override file for local development
# This file is automatically loaded by docker-compose
version: "3.9"

services:
  postgres:
    # Expose additional port for debugging tools (DBeaver, TablePlus, etc.)
    ports:
      - "5432:5432"
    environment:
      # Enable PostgreSQL logging for development
      POSTGRES_HOST_AUTH_METHOD: trust

  redis:
    # Enable Redis persistence in development
    command: redis-server --appendonly yes
